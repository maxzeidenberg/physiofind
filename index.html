const GOOGLE_API_KEY = "AIzaSyCQ5SQ3C-Yk4RpVS_ud81ykbaKmn1T7iDA";

const T = { ink:"#152230", pine:"#2C6187", pineDark:"#1E3A52", bg:"#F2F6F9", amber:"#A85D2B", amberBg:"#F7EDE4", line:"#D5DEE6", sub:"#5A6B78" };
const FONT = "'Sora', system-ui, sans-serif";

const INSURANCES = ["MassHealth","Medicare","Blue Cross Blue Shield","Harvard Pilgrim","Tufts Health Plan","Mass General Brigham Health Plan","WellSense Health Plan","Fallon Health","UnitedHealthcare","Aetna","Cigna"];
const CALL_SCRIPT = [
"Do you accept my insurance? (Give the exact plan name on your card.)",
"Is there a copay per visit, and do I need prior authorization?",
"Do you have any openings in the next 1-2 weeks?",
"Do you need a referral or prescription faxed? What is your fax number?",
"How long is the first evaluation visit?",
];

const params = new URLSearchParams(window.location.search);
const PROVIDER_NAME = params.get("provider") || "your provider's office";
const DEFAULT_PARTNERS = ["ATI", "Baystate", "Bay State", "BMC", "Boston Medical Center", "Boston University Physical Therapy"];
const PARTNER_NETWORKS = [...DEFAULT_PARTNERS, ...(params.get("partners") || "").split(",").map(s => s.trim()).filter(Boolean)];
// Whole-word match so e.g. "ATI" doesn't falsely match "rehabilitATIon".
const isPreferred = (c) => {
const name = " " + (c.name || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim() + " ";
return PARTNER_NETWORKS.some(net => name.includes(" " + net.toLowerCase().trim() + " "));
};

// Published accepted-plan data for partner clinics (major MA plans matching our list).
// Source: each clinic's own insurance page. Data can change - always confirm by phone.
const PARTNER_INFO = [
{ tokens:["ati"], name:"ATI Physical Therapy", url:"https://www.atipt.com/new-patients/insurance/", schedule:"https://appointments.atipt.com/", accepts:["MassHealth","Medicare","Blue Cross Blue Shield","Harvard Pilgrim","Mass General Brigham Health Plan","Fallon Health","UnitedHealthcare","Aetna","Cigna"] },
{ tokens:["baystate","bay state"], name:"Bay State Physical Therapy", url:"https://baystatept.com/patient-information/insurances-we-accept/", schedule:"https://baystatept.com/request-an-appointment-navigation-bar/", accepts:["MassHealth","Medicare","Blue Cross Blue Shield","Harvard Pilgrim","Tufts Health Plan","Mass General Brigham Health Plan","WellSense Health Plan","Fallon Health","UnitedHealthcare","Aetna","Cigna"] },
];
const getPartnerInfo = (clinicName) => {
const name = " " + (clinicName || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim() + " ";
return PARTNER_INFO.find(p => p.tokens.some(t => name.includes(" " + t.toLowerCase() + " "))) || null;
};

const [insurance, setInsurance] = useState("");

const [error, setError] = useState("");
const [loading, setLoading] = useState(false);
const [clinics, setClinics] = useState([]);
const [chosen, setChosen] = useState(null);
const [manualName, setManualName] = useState("");
const [apptDate, setApptDate] = useState("");
const [faxNumber, setFaxNumber] = useState("");
const [copied, setCopied] = useState(false);

const preferred = clinics.filter(isPreferred);
const others = clinics.filter(c => !isPreferred(c));

async function findClinics() {
if (!/^\d{5}$/.test(zip.trim())) { setError("Enter a 5-digit ZIP code."); return; }
setError(""); setLoading(true);
try {
const res = await fetch("https://places.googleapis.com/v1/places:searchText", {
method: "POST",
headers: {
"Content-Type": "application/json",
"X-Goog-Api-Key": GOOGLE_API_KEY,
"X-Goog-FieldMask": "places.displayName,places.formattedAddress,places.nationalPhoneNumber,places.regularOpeningHours.weekdayDescriptions,places.rating,places.userRatingCount",
},
body: JSON.stringify({ textQuery: "outpatient physical therapy clinic near " + zip.trim(), maxResultCount: 12 }),
});
if (!res.ok) { setError("Clinic lookup failed. Double-check the ZIP and try again."); return; }
const data = await res.json();
const list = (data.places || []).map(p => ({
name: p.displayName?.text || "",
address: p.formattedAddress || "",
phone: p.nationalPhoneNumber || "",
rating: p.rating || null,
ratingCount: p.userRatingCount || null,
saturday: (p.regularOpeningHours?.weekdayDescriptions || []).some(d => d.startsWith("Saturday") && !d.includes("Closed")),
})).filter(c => c.name && c.address);
if (list.length === 0) { setError("No clinics found for that ZIP. Try a nearby ZIP code."); return; }
setClinics(list); setStep(2); window.scrollTo(0,0);
} catch (e) {
setError("Couldn't load clinics. Check your connection and try again.");
} finally { setLoading(false); }
}

function pickClinic(c) { setChosen(c); setStep(3); window.scrollTo(0,0); }
function pickManual() {
if (!manualName.trim()) { setError("Enter the clinic name first."); return; }
setError(""); setChosen({ name: manualName.trim(), address: "" }); setStep(3); window.scrollTo(0,0);
}

function confirmationMessage() {
return [
"Hi - this is regarding my physical therapy referral" + (reason ? " for " + reason : "") + ".",
"",
"I scheduled my first PT appointment:",
"- Clinic: " + (chosen?.name || "(clinic name)"),
chosen?.address ? "- Address: " + chosen.address : null,
chosen?.phone ? "- Clinic phone: " + chosen.phone : null,
"- First visit: " + (apptDate || "(date/time)"),
faxNumber ? "- Clinic fax for the referral: " + faxNumber : "- Clinic fax: (I can get this from the clinic if needed)",
"",
"Please send the referral/prescription if the clinic needs it. Thank you!",
].filter(l => l !== null).join("\n");
}

async function copyMessage() {
try { await navigator.clipboard.writeText(confirmationMessage()); setCopied(true); setTimeout(() => setCopied(false), 2000); }
catch (e) { setCopied(false); }
}

<p style={{margin:"0 0 10px", fontSize:14}}>
{c.rating ? c.rating + "★ (" + c.ratingCount + " reviews)" : ""}
{c.rating && c.saturday ? " · " : ""}
{c.saturday ? "Open Saturdays" : ""}
</p>
{(() => {
const info = getPartnerInfo(c.name);

const sel = insurance.trim();
const accepted = sel && info.accepts.some(p => p.toLowerCase() === sel.toLowerCase());
return (

{sel && !accepted && <p style={{margin:0, fontSize:13, fontWeight:600, color:T.amber}}>{sel} isn't on their published list — ask when you call.</p>}
{info.schedule && <a href={info.schedule} target="_blank" rel="noopener noreferrer" style={{display:"inline-block", marginTop: sel ? 8 : 0, fontSize:14, fontWeight:600, color:"#fff", background:T.pine, padding:"8px 12px", borderRadius:8, textDecoration:"none"}}>Book appointment online ↗</a>}
<details style={{marginTop:8}}>
<summary style={{fontSize:13, fontWeight:600, color:T.ink, cursor:"pointer"}}>Accepted insurance (major MA plans)</summary>
<p style={{margin:"6px 0 4px", fontSize:13, color:T.sub, lineHeight:1.5}}>{info.accepts.join(" · ")}</p>
<a href={info.url} target="_blank" rel="noopener noreferrer" style={{fontSize:13, fontWeight:600, color:T.pine, textDecoration:"none"}}>See {info.name}'s full list ↗</a>
</details>
</div>
);
})()}
<div style={{display:"flex", gap:8}}>

<button onClick={() => pickClinic(c)} style={{...secondaryBtn, flex:1}}>I booked here</button>
</div>
</section>
);

<div key={label} style={{flex:1}}>
<div style={{height:6, borderRadius:99, background: done||active ? T.pine : T.line}} />
<div style={{marginTop:6, fontSize:12, fontWeight:600, color: active ? T.pineDark : T.sub}}>{n}. {label}</div>
</div>
);
})}
</nav>

<main style={{maxWidth:560, margin:"0 auto", padding:"16px 20px 40px"}}>
{step===1 && (
<section style={cardStyle}>
<h2 style={h2Style}>Let's get you set up</h2>
<label style={labelStyle} htmlFor="zip">Your ZIP code</label>
<input id="zip" inputMode="numeric" maxLength={5} value={zip} onChange={e => setZip(e.target.value.replace(/\D/g,""))} placeholder="e.g. 02118" style={inputStyle} />
<label style={labelStyle}>Your insurance</label>
<div style={{display:"flex", flexWrap:"wrap", gap:8, marginBottom:8}}>
{INSURANCES.map(name => (
<button key={name} onClick={() => setInsurance(name)} style={{...chipStyle, background: insurance===name ? T.pine : "#fff", color: insurance===name ? "#fff" : T.ink, borderColor: insurance===name ? T.pine : T.line}}>{name}</button>
))}
</div>
<input value={insurance} onChange={e => setInsurance(e.target.value)} placeholder="Or type your exact plan name" style={inputStyle} />
<label style={labelStyle} htmlFor="reason">What is PT for? (optional)</label>
<input id="reason" value={reason} onChange={e => setReason(e.target.value)} placeholder="e.g. right knee, after shoulder surgery" style={inputStyle} />
{error && <p style={errorStyle}>{error}</p>}
<button onClick={findClinics} disabled={loading} style={{...primaryBtn, background: loading ? "#8AA8BE" : T.pine}}>{loading ? "Searching near you..." : "Show PT clinics near me"}</button>
<p style={{fontSize:13, color:T.sub, margin:"10px 0 0"}}>Only your ZIP code is used to search. Nothing about you is saved.</p>
</section>
)}

{step===2 && (
<React.Fragment>
<section style={{...cardStyle, background:T.amberBg, border:"1px solid #EAD9C6"}}>
<p style={{margin:0, fontSize:14}}><strong style={{color:T.amber}}>Always confirm by phone.</strong> Insurance lists online are often out of date. When you call, ask if they accept <strong>{insurance || "your plan"}</strong> before booking.</p>
</section>
<section style={cardStyle}>
<h3 style={{...h2Style, fontSize:16}}>What to ask when you call</h3>
<ol style={{margin:0, paddingLeft:20, fontSize:15, lineHeight:1.6}}>{CALL_SCRIPT.map(q => <li key={q} style={{marginBottom:6}}>{q}</li>)}</ol>
</section>
{preferred.length > 0 && (
<React.Fragment>
<h2 style={{...h2Style, margin:"18px 0 4px"}}>Recommended clinics</h2>
<p style={{fontSize:14, color:T.sub, margin:"0 0 10px"}}>These coordinate directly with {PROVIDER_NAME}, which makes referrals smoother.</p>
{preferred.map(clinicCard)}
</React.Fragment>
)}
<h2 style={{...h2Style, margin:"18px 0 10px"}}>{preferred.length > 0 ? "More clinics" : "Clinics"} near {zip}</h2>
{others.map(clinicCard)}
<section style={cardStyle}>
<h3 style={{...h2Style, fontSize:16}}>Booked somewhere else?</h3>
<input value={manualName} onChange={e => setManualName(e.target.value)} placeholder="Type the clinic name" style={inputStyle} />
{error && <p style={errorStyle}>{error}</p>}
<button onClick={pickManual} style={primaryBtn}>Use this clinic</button>
</section>
<button onClick={() => { setError(""); setStep(1); }} style={linkBtn}>← Change my info</button>
</React.Fragment>
)}

{step===3 && chosen && (
<React.Fragment>
<section style={cardStyle}>
<h2 style={h2Style}>Great - you booked at {chosen.name}</h2>
<p style={{fontSize:15, margin:"0 0 14px"}}>Last step: send this message to {PROVIDER_NAME} (for example, through your patient portal) so they can fax your referral and mark PT as scheduled.</p>
<label style={labelStyle} htmlFor="appt">First appointment date & time</label>
<input id="appt" value={apptDate} onChange={e => setApptDate(e.target.value)} placeholder="e.g. Tue July 14, 2:30 PM" style={inputStyle} />
<label style={labelStyle} htmlFor="fax">Clinic fax number (ask the clinic)</label>
<input id="fax" value={faxNumber} onChange={e => setFaxNumber(e.target.value)} placeholder="e.g. (617) 555-0142" style={inputStyle} />
<div style={{background:T.bg, border:"1px solid " + T.line, borderRadius:10, padding:14, fontSize:14, whiteSpace:"pre-wrap", marginBottom:12, marginTop:12}}>{confirmationMessage()}</div>
<button onClick={copyMessage} style={primaryBtn}>{copied ? "Copied ✓" : "Copy message to send"}</button>
<p style={{fontSize:13, color:T.sub, margin:"10px 0 0"}}>Paste it into a portal message to {PROVIDER_NAME}.</p>
</section>
<button onClick={() => setStep(2)} style={linkBtn}>← Back to clinics</button>
</React.Fragment>
)}

<footer style={{marginTop:24, fontSize:12, color:T.sub, lineHeight:1.5}}>Clinic details come from a live search and may be incomplete - always confirm insurance, availability, and fax numbers directly with the clinic. This tool does not collect or store personal health information.</footer>
</main>
</div>
);
}

const cardStyle = { background:"#fff", border:"1px solid #D5DEE6", borderRadius:14, padding:18, marginBottom:14 };
const h2Style = { fontFamily:FONT, fontSize:18, fontWeight:600, margin:"0 0 12px", color:T.ink };
const labelStyle = { display:"block", fontSize:13, fontWeight:600, color:T.sub, margin:"10px 0 6px" };
const inputStyle = { width:"100%", padding:"12px 14px", fontSize:16, border:"1px solid " + T.line, borderRadius:10, background:"#fff" };
const chipStyle = { padding:"8px 12px", fontSize:14, fontWeight:600, border:"1px solid", borderRadius:99, cursor:"pointer" };
const errorStyle = { color:"#9A3412", fontSize:14, margin:"4px 0 8px" };
const badgeStyle = { display:"inline-block", background:T.pine, color:"#fff", fontSize:12, fontWeight:600, borderRadius:99, padding:"3px 10px", marginBottom:8 };
const primaryBtn = { width:"100%", padding:"14px 16px", fontSize:16, fontWeight:600, fontFamily:FONT, color:"#fff", background:T.pine, border:"none", borderRadius:10, cursor:"pointer", marginTop:8 };
const secondaryBtn = { padding:"14px 16px", fontSize:15, fontWeight:600, fontFamily:FONT, color:T.pine, background:"#fff", border:"2px solid " + T.pine, borderRadius:10, cursor:"pointer" };
const linkBtn = { background:"none", border:"none", color:T.pine, fontSize:15, fontWeight:600, cursor:"pointer", padding:"8px 0" };

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
